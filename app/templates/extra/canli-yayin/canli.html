{% extends "base.html" %}
{% block content %}

<style>
  .canli-wrap {
    min-height: calc(100vh - 60px);
    background: var(--dark);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 48px;
  }

  .canli-header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .canli-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .canli-title span {
    color: var(--gray);
    font-weight: 400;
    font-size: 0.9rem;
    margin-left: 8px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 7px;
    background: rgba(220, 38, 38, 0.15);
    border: 1px solid rgba(220, 38, 38, 0.35);
    color: #f87171;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 5px 12px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  .live-dot {
    width: 7px;
    height: 7px;
    background: #ef4444;
    border-radius: 50%;
    animation: livePulse 1.4s infinite;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .player-container {
    width: 100%;
    max-width: 900px;
    background: #000;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    aspect-ratio: 16 / 9;
    box-shadow: 0 24px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
  }

  #canli-video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }

  .waiting-screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    gap: 20px;
    padding: 32px;
  }

  .waiting-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(255,193,7,0.08);
    border: 1px solid rgba(255,193,7,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    position: relative;
  }

  .waiting-icon::after {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(255,193,7,0.12);
    animation: waitRing 2.5s infinite ease-out;
  }

  @keyframes waitRing {
    0% { transform: scale(0.9); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .waiting-screen h3 {
    color: var(--text);
    font-size: 1.2rem;
    font-weight: 700;
    margin: 0;
  }

  .waiting-screen p {
    color: var(--gray);
    font-size: 0.9rem;
    text-align: center;
    margin: 0;
    max-width: 300px;
    line-height: 1.5;
  }

  .waiting-dots {
    display: flex;
    gap: 6px;
  }

  .waiting-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--primary);
    opacity: 0.3;
    animation: dotBounce 1.4s infinite;
  }

  .waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
  .waiting-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
    backdrop-filter: blur(4px);
  }

  .spinner {
    width: 44px;
    height: 44px;
    border: 3px solid rgba(255,193,7,0.2);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spinAnim 0.9s linear infinite;
  }

  @keyframes spinAnim {
    to { transform: rotate(360deg); }
  }

  .error-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 5;
    backdrop-filter: blur(4px);
  }

  .error-overlay .err-icon {
    font-size: 2.5rem;
    opacity: 0.7;
  }

  .error-overlay p {
    color: var(--gray);
    font-size: 0.9rem;
    text-align: center;
    margin: 0;
  }

  .retry-btn {
    background: var(--primary);
    color: var(--dark);
    border: none;
    padding: 10px 24px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
  }

  .retry-btn:hover {
    background: var(--primary-hover);
    transform: translateY(-1px);
  }

  .status-bar {
    width: 100%;
    max-width: 900px;
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 0.82rem;
    color: var(--gray);
  }

  .hidden { display: none !important; }
</style>

<div class="canli-wrap">
  <div class="canli-header">
    <div class="canli-title">
      18 Mart Çanakkale Zaferi
      <span>Canlı Yayın</span>
    </div>
    <div class="live-badge" id="liveBadge" style="display:none;">
      <div class="live-dot"></div>
      CANLI
    </div>
  </div>

  <div class="player-container" id="playerContainer">

    <div class="waiting-screen" id="waitingScreen">
      <div class="waiting-icon">📡</div>
      <h3>Yayın Bekleniyor</h3>
      <p>Tören başladığında yayın otomatik olarak açılacak</p>
      <div class="waiting-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="loading-overlay hidden" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <div class="error-overlay hidden" id="errorOverlay">
      <div class="err-icon">⚠️</div>
      <p id="errorMsg">Bağlantı kesildi</p>
      <button class="retry-btn" onclick="retryStream()">Yeniden Bağlan</button>
    </div>

    <video id="canli-video" controls playsinline style="display:none;"></video>
  </div>

  <div class="status-bar">
    <div id="statusText">⏳ Yayın bekleniyor...</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
  var STREAM_URL = 'https://cagrivakti.com.tr/canli-stream/canli/index.m3u8';
  var isLive = {{ stream_live | tojson }};
  var hls = null;
  var poller = null;
  var retryCount = 0;
  var MAX_RETRY = 3;

  function setStatus(msg) {
    document.getElementById('statusText').textContent = msg;
  }

  function showLiveBadge(show) {
    document.getElementById('liveBadge').style.display = show ? 'flex' : 'none';
  }

  function showOverlay(name) {
    ['loadingOverlay','errorOverlay'].forEach(function(id) {
      document.getElementById(id).classList.add('hidden');
    });
    if (name) document.getElementById(name).classList.remove('hidden');
  }

  function startPlayer() {
    var video = document.getElementById('canli-video');
    document.getElementById('waitingScreen').style.display = 'none';
    video.style.display = 'block';
    showOverlay('loadingOverlay');
    showLiveBadge(true);
    setStatus('🔄 Yayına bağlanıyor...');

    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
      hls = new Hls({ maxBufferLength: 15, maxMaxBufferLength: 30 });
      hls.loadSource(STREAM_URL);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        showOverlay(null);
        setStatus('🔴 Canlı yayın aktif');
        retryCount = 0;
        video.play().catch(function(){});
      });

      hls.on(Hls.Events.ERROR, function(event, data) {
        if (data.fatal) { handleStreamError(); }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = STREAM_URL;
      video.addEventListener('loadedmetadata', function() {
        showOverlay(null);
        setStatus('🔴 Canlı yayın aktif');
        video.play();
      });
    }
  }

  function handleStreamError() {
    if (retryCount < MAX_RETRY) {
      retryCount++;
      setStatus('⚡ Yeniden bağlanıyor... (' + retryCount + '/' + MAX_RETRY + ')');
      showOverlay('loadingOverlay');
      setTimeout(function() {
        fetch('/stream/status')
          .then(function(r){ return r.json(); })
          .then(function(d) {
            if (d.live) {
              if (hls) { hls.startLoad(); } else { startPlayer(); }
            } else { streamEnded(); }
          })
          .catch(function(){ streamEnded(); });
      }, 4000);
    } else {
      streamEnded();
    }
  }

  function streamEnded() {
    showLiveBadge(false);
    document.getElementById('errorMsg').textContent = 'Yayın sona erdi veya bağlantı kesildi';
    showOverlay('errorOverlay');
    setStatus('⚫ Yayın sona erdi');
    startPolling();
  }

  function retryStream() {
    retryCount = 0;
    fetch('/stream/status')
      .then(function(r){ return r.json(); })
      .then(function(d) {
        if (d.live) {
          startPlayer();
        } else {
          showOverlay(null);
          document.getElementById('waitingScreen').style.display = 'flex';
          document.getElementById('canli-video').style.display = 'none';
          showLiveBadge(false);
          setStatus('⏳ Yayın bekleniyor...');
          startPolling();
        }
      });
  }

  function startPolling() {
    if (poller) clearInterval(poller);
    poller = setInterval(function() {
      fetch('/stream/status')
        .then(function(r){ return r.json(); })
        .then(function(d) {
          if (d.live) {
            clearInterval(poller);
            poller = null;
            startPlayer();
          }
        })
        .catch(function(){});
    }, 5000);
  }

  if (isLive) { startPlayer(); } else { startPolling(); }
</script>
{% endblock %}
