{% extends "base.html" %}

{% block title %}QRyi - QR Kod Okuyucu{% endblock %}

{% block extra_head %}
<link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
<meta name="theme-color" content="#1a2a6c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-192.png') }}">

<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

<script src="https://unpkg.com/html5-qrcode"></script>
{% endblock %}


{% block content %}

<h1>QRyi<br>QR Kod Okuyucu</h1>

<div id="reader-container">
    <div id="reader"></div>
</div>

<div id="result">📸 Kamera başlatılıyor...</div>

<div id="result-actions" style="display:none;">
    <button id="openUrlBtn">🔗 URL'yi Aç</button>
    <button id="shareUrlBtn">📤 Paylaş</button>
</div>

<button id="scanAgainBtn" style="display:none;">🔄 Yeni Tarama</button>

<button id="clearHistoryBtn">🗑️ Geçmişi Temizle</button>

<div id="history"></div>

{% endblock %}


{% block extra_js %}

<script>
document.addEventListener("DOMContentLoaded", () => {

  const resultDiv = document.getElementById("result");
  const historyDiv = document.getElementById("history");
  const resultActionsDiv = document.getElementById("result-actions");

  const openUrlBtn = document.getElementById("openUrlBtn");
  const shareUrlBtn = document.getElementById("shareUrlBtn");

  const scanAgainBtn = document.getElementById("scanAgainBtn");
  const clearHistoryBtn = document.getElementById("clearHistoryBtn");

  let lastResult = null;
  let scanner = null;

  const html5QrCode = new Html5Qrcode("reader");

  function loadHistory(){
      const history = JSON.parse(localStorage.getItem("qrHistory") || "[]");
      historyDiv.innerHTML = history.map(h => `<div>${h}</div>`).join("");
  }

  function saveHistory(value){
      let history = JSON.parse(localStorage.getItem("qrHistory") || "[]");
      history.unshift(value);
      history = history.slice(0,10);
      localStorage.setItem("qrHistory", JSON.stringify(history));
      loadHistory();
  }

  function startScanner(){

      html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          (decodedText) => {

              if(decodedText === lastResult) return;

              lastResult = decodedText;

              html5QrCode.stop();

              resultDiv.textContent = decodedText;

              resultActionsDiv.style.display = "flex";
              scanAgainBtn.style.display = "inline-block";

              saveHistory(decodedText);
          },
          () => {}
      );
  }

  openUrlBtn.addEventListener("click", () => {
      if(lastResult) window.open(lastResult, "_blank");
  });

  shareUrlBtn.addEventListener("click", async () => {

      if(!lastResult) return;

      if(navigator.share){
          await navigator.share({
              title:"QR Sonucu",
              text:lastResult,
              url:lastResult
          });
      }
  });

  scanAgainBtn.addEventListener("click", () => {

      resultActionsDiv.style.display="none";
      scanAgainBtn.style.display="none";
      resultDiv.textContent="📸 Kamera başlatılıyor...";

      lastResult = null;

      startScanner();
  });

  clearHistoryBtn.addEventListener("click", () => {

      localStorage.removeItem("qrHistory");
      loadHistory();
  });

  loadHistory();
  startScanner();

});
</script>

{% endblock %}
