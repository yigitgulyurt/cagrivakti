{% extends "base.html" %}

{% block title %}QRyi - QR Kod Okuyucu{% endblock %}

{% block extra_css %}
<style>
/* QR Sayfası Konteyneri */
#qr-page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px;
    background: linear-gradient(135deg, #121212, #1e1e1e);
    color: var(--text);
    font-family: "Inter", sans-serif;
}

#qr-page h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--primary);
}

/* QR Okuyucu Kartı */
#reader-container {
    width: 80vmin;
    max-width: 400px;
    aspect-ratio: 1 / 1;
    border-radius: 20px;
    overflow: hidden;
    background: var(--card-bg);
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
}

#reader { width: 100%; height: 100%; background: #000; }

/* Sonuç ve Geçmiş */
#result, #history {
    width: 90%;
    max-width: 400px;
    margin: 16px auto;
    padding: 16px;
    border-radius: 16px;
    text-align: center;
    word-break: break-word;
    font-size: 16px;
    min-height: 2em;
    background: var(--card-bg);
    border: 1px solid rgba(255,255,255,0.05);
    box-shadow: var(--card-shadow);
    transition: var(--transition);
}

#history {
    text-align: left;
    font-size: 14px;
    max-height: 150px;
    overflow-y: auto;
}

/* Butonlar */
#result-actions, #scanAgainBtn, #clearHistoryBtn {
    width: 90%;
    max-width: 400px;
    margin: 16px auto;
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 12px;
    font-weight: 600;
    cursor: pointer;
    font-size: 1rem;
    transition: var(--transition);
    color: var(--text);
    background: var(--primary);
    box-shadow: var(--card-shadow);
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.35);
}

/* Özel Buton Renkleri */
#scanAgainBtn { background: var(--primary); }
#openUrlBtn { background: #4cc9f0; }
#shareUrlBtn { background: #72efdd; }
#clearHistoryBtn { background: #f72585; }

/* Responsive Küçük Ekran */
@media (max-width: 480px) {
    #reader-container { width: 90vmin; }
    #result, #history, #result-actions { width: 95%; }
}
</style>
{% endblock %}

{% block content %}
<div id="qr-page">

    <h1>QRyi<br>QR Kod Okuyucu</h1>

    <div id="reader-container">
        <div id="reader"></div>
    </div>

    <div id="result">📸 Kamera başlatılıyor...</div>

    <div id="result-actions" style="display:none;">
        <button id="openUrlBtn">🔗 URL'yi Aç</button>
        <button id="shareUrlBtn">📤 Paylaş</button>
    </div>

    <button id="scanAgainBtn" style="display:none;">🔄 Yeni Tarama</button>
    <button id="clearHistoryBtn">🗑️ Geçmişi Temizle</button>

    <div id="history"></div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/html5-qrcode.min.js') }}"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const resultDiv = document.getElementById("result");
    const historyDiv = document.getElementById("history");
    const resultActionsDiv = document.getElementById("result-actions");
    const openUrlBtn = document.getElementById("openUrlBtn");
    const shareUrlBtn = document.getElementById("shareUrlBtn");
    const clearHistoryBtn = document.getElementById("clearHistoryBtn");
    const scanAgainBtn = document.getElementById("scanAgainBtn");

    const html5QrCode = new Html5Qrcode("reader");
    let history = JSON.parse(localStorage.getItem("qr_history") || "[]");
    let currentResultText = "";
    let isScanning = false;

    const config = { fps: 10, qrbox: viewfinder => { let h=Math.min(400,viewfinder*1); return {width:h*0.75,height:h}; } };
    const cameraFacingMode = { facingMode: "environment" };
    const isValidUrl = s => { try { new URL(s); return true; } catch { return false; };
    };

    const renderHistory = () => {
        historyDiv.innerHTML = history.length === 0
            ? "<b>📜 Geçmiş yok</b>"
            : "<b>📜 Okunan QR Geçmişi:</b><br>" + history.map(q => `<div style="padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.1);">${q}</div>`).join("");
    };

    const startScanning = () => {
        if (isScanning) return;
        resultDiv.textContent = "🔍 QR kodunu tarama alanına getirin...";
        scanAgainBtn.style.display = "none";
        resultActionsDiv.style.display = "none";
        html5QrCode.start(cameraFacingMode, config, handleResult, console.warn)
        .then(() => isScanning = true)
        .catch(err => {
            isScanning=false;
            resultDiv.textContent=String(err).includes("Permission denied")
                ? "⚠️ Kamera izni reddedildi. Lütfen izin verin."
                : "❌ Kamera başlatılamadı.";
            scanAgainBtn.style.display = "inline-block";
        });
    };

    const handleResult = text => {
        html5QrCode.stop().then(() => {
            isScanning=false;
            scanAgainBtn.style.display="inline-block";
            currentResultText=text;
            resultDiv.textContent=text;
            resultActionsDiv.style.display=isValidUrl(text)?"flex":"none";
            if(!history.includes(text)){history.unshift(text); if(history.length>10)history.pop(); localStorage.setItem("qr_history",JSON.stringify(history)); renderHistory();}
        });
    };

    scanAgainBtn?.addEventListener("click", startScanning);
    openUrlBtn?.addEventListener("click",()=>isValidUrl(currentResultText)&&window.open(currentResultText,'_blank'));
    shareUrlBtn?.addEventListener("click",()=>navigator.share&&isValidUrl(currentResultText)&&navigator.share({title:'Taranan QR Kod',text:'Bu QR kod içeriğini paylaşıyorum:',url:currentResultText}));
    clearHistoryBtn?.addEventListener("click",()=>{if(confirm("Geçmişi silmek istediğinizden emin misiniz?")){history=[];localStorage.removeItem("qr_history");renderHistory();}});

    startScanning();
    renderHistory();
});
</script>
{% endblock %}
