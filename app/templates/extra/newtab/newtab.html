<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --glass: rgba(255,255,255,0.08);
    --glass-border: rgba(255,255,255,0.15);
    --glass-hover: rgba(255,255,255,0.14);
    --blur: 18px;
    --text: rgba(255,255,255,0.92);
    --text-dim: rgba(255,255,255,0.5);
    --accent: rgba(180,160,255,0.85);
  }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    font-family: 'Outfit', sans-serif;
    color: var(--text);
    overflow: hidden;
  }

  /* Subtle animated mesh вҖ” sits behind browser's own wallpaper */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(120,80,255,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 70% at 80% 80%, rgba(60,180,255,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 50% 50% at 50% 50%, rgba(255,120,180,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
    animation: meshShift 18s ease-in-out infinite alternate;
  }

  @keyframes meshShift {
    0%   { opacity: 0.7; transform: scale(1); }
    100% { opacity: 1;   transform: scale(1.04); }
  }

  .page {
    position: relative; z-index: 1;
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto 1fr;
    grid-template-columns: 1fr;
    align-items: center;
    justify-items: center;
    padding: 40px 60px;
    gap: 0;
  }

  /* в”Җв”Җ TOP: Clock в”Җв”Җ */
  .clock-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 36px;
    animation: fadeUp 0.8s ease both;
  }

  .time {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(72px, 10vw, 120px);
    font-weight: 400;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(200,180,255,0.9) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  .date {
    margin-top: 10px;
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* в”Җв”Җ MIDDLE: Search в”Җв”Җ */
  .search-section {
    width: 100%;
    max-width: 620px;
    animation: fadeUp 0.8s 0.15s ease both;
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-input {
    width: 100%;
    padding: 16px 56px 16px 24px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 16px;
    font-weight: 300;
    outline: none;
    transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  }

  .search-input::placeholder { color: var(--text-dim); }

  .search-input:focus {
    background: var(--glass-hover);
    border-color: rgba(180,160,255,0.4);
    box-shadow: 0 0 0 3px rgba(180,160,255,0.12), 0 8px 32px rgba(0,0,0,0.2);
  }

  .search-icon {
    position: absolute; right: 18px;
    color: var(--text-dim);
    pointer-events: none;
    transition: color 0.2s;
  }

  .search-input:focus ~ .search-icon { color: var(--accent); }

  /* в”Җв”Җ BOTTOM: Links + Weather в”Җв”Җ */
  .bottom-section {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 36px;
    gap: 24px;
    animation: fadeUp 0.8s 0.3s ease both;
  }

  /* Quick Links */
  .links-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    max-width: 680px;
  }

  .link-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    min-width: 80px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 14px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    text-decoration: none;
    color: var(--text);
    font-size: 12px;
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    user-select: none;
  }

  .link-card:hover {
    background: var(--glass-hover);
    border-color: rgba(255,255,255,0.28);
    transform: translateY(-3px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.2);
  }

  .link-icon {
    font-size: 22px;
    line-height: 1;
  }

  .link-label {
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  /* Weather */
  .weather-card {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
  }

  .weather-card:hover {
    background: var(--glass-hover);
    transform: translateY(-2px);
  }

  .weather-icon { font-size: 28px; line-height: 1; }

  .weather-info { display: flex; flex-direction: column; gap: 2px; }

  .weather-temp {
    font-size: 20px;
    font-weight: 500;
    line-height: 1;
  }

  .weather-desc {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .weather-loc {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: 4px;
    letter-spacing: 0.5px;
    opacity: 0.7;
  }

  /* Edit overlay */
  .edit-btn {
    position: fixed;
    bottom: 20px; right: 20px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    color: var(--text-dim);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Outfit', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .edit-btn:hover { background: var(--glass-hover); color: var(--text); }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(8px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: rgba(20,15,40,0.85);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    padding: 32px;
    width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .modal h2 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: 22px;
    color: var(--text);
  }

  .modal-section { display: flex; flex-direction: column; gap: 10px; }

  .modal-section label {
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .modal-input {
    padding: 10px 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  .modal-input:focus { border-color: var(--accent); }

  .link-editor { display: flex; flex-direction: column; gap: 8px; }

  .link-row {
    display: grid;
    grid-template-columns: 1fr 1fr 40px;
    gap: 8px;
    align-items: center;
  }

  .link-row .modal-input { font-size: 13px; }

  .remove-btn {
    background: rgba(255,80,80,0.15);
    border: 1px solid rgba(255,80,80,0.25);
    border-radius: 8px;
    color: rgba(255,120,120,0.9);
    cursor: pointer;
    height: 36px;
    font-size: 16px;
    transition: background 0.2s;
  }

  .remove-btn:hover { background: rgba(255,80,80,0.3); }

  .add-btn, .save-btn {
    padding: 10px 18px;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    font-weight: 500;
  }

  .add-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid var(--glass-border);
    color: var(--text);
    align-self: flex-start;
  }

  .add-btn:hover { background: rgba(255,255,255,0.14); }

  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }

  .cancel-btn {
    padding: 10px 18px;
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--glass-border);
    color: var(--text-dim);
    transition: all 0.2s;
  }

  .cancel-btn:hover { background: rgba(255,255,255,0.06); }

  .save-btn {
    background: rgba(180,160,255,0.25);
    border: 1px solid rgba(180,160,255,0.4);
    color: var(--text);
  }

  .save-btn:hover { background: rgba(180,160,255,0.4); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }
</style>
</head>
<body>

<div class="page">

  <!-- CLOCK -->
  <div class="clock-section">
    <div class="time" id="clock">00:00</div>
    <div class="date" id="date-display">вҖ”</div>
  </div>

  <!-- SEARCH -->
  <div class="search-section">
    <div class="search-wrap">
      <input class="search-input" id="search-input" type="text" placeholder="Ara veya adres girвҖҰ" autocomplete="off" />
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>
  </div>

  <!-- LINKS + WEATHER -->
  <div class="bottom-section">
    <div class="links-grid" id="links-grid"></div>
    <div class="weather-card" id="weather-card" onclick="refreshWeather()">
      <div class="weather-icon" id="w-icon">вҹі</div>
      <div class="weather-info">
        <div class="weather-temp" id="w-temp">вҖ”</div>
        <div class="weather-desc" id="w-desc">Konum alДұnДұyorвҖҰ</div>
      </div>
      <div class="weather-loc" id="w-loc"></div>
    </div>
  </div>
</div>

<!-- EDIT BUTTON -->
<button class="edit-btn" onclick="openModal()">вңҰ DГјzenle</button>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>SayfayДұ DГјzenle</h2>

    <div class="modal-section">
      <label>Еһehir (Hava Durumu)</label>
      <input class="modal-input" id="city-input" placeholder="Д°stanbul" />
    </div>

    <div class="modal-section">
      <label>HДұzlДұ Linkler</label>
      <div class="link-editor" id="link-editor"></div>
      <button class="add-btn" onclick="addLinkRow()">+ Link Ekle</button>
    </div>

    <div class="modal-footer">
      <button class="cancel-btn" onclick="closeModal()">Д°ptal</button>
      <button class="save-btn" onclick="saveSettings()">Kaydet</button>
    </div>
  </div>
</div>

<script>
// в”Җв”Җ Default data в”Җв”Җ
const DEFAULT_LINKS = [
  { label: "Gmail",    url: "https://mail.google.com",    icon: "рҹ“§" },
  { label: "GitHub",   url: "https://github.com",         icon: "рҹҗҷ" },
  { label: "YouTube",  url: "https://youtube.com",        icon: "в–¶пёҸ" },
  { label: "Twitter",  url: "https://twitter.com",        icon: "рҹҗҰ" },
  { label: "Notion",   url: "https://notion.so",          icon: "рҹ“қ" },
  { label: "Reddit",   url: "https://reddit.com",         icon: "рҹҹ " },
];

// в”Җв”Җ Storage helpers в”Җв”Җ
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch {}
}

let links = load('nt_links', DEFAULT_LINKS);
let city  = load('nt_city', 'Istanbul');

// в”Җв”Җ Clock в”Җв”Җ
function tick() {
  const now  = new Date();
  const h    = String(now.getHours()).padStart(2,'0');
  const m    = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('clock').textContent = `${h}:${m}`;

  const days = ['Pazar','Pazartesi','SalДұ','ГҮarЕҹamba','PerЕҹembe','Cuma','Cumartesi'];
  const months = ['Oca','Еһub','Mar','Nis','May','Haz','Tem','AДҹu','Eyl','Eki','Kas','Ara'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]}  В·  ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}
tick();
setInterval(tick, 1000);

// в”Җв”Җ Search в”Җв”Җ
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const q = e.target.value.trim();
  if (!q) return;
  const url = /^https?:\/\//.test(q) || /^[\w-]+\.\w{2,}/.test(q)
    ? (q.startsWith('http') ? q : 'https://' + q)
    : `https://www.google.com/search?q=${encodeURIComponent(q)}`;
  window.location.href = url;
});

// в”Җв”Җ Links в”Җв”Җ
function renderLinks() {
  const grid = document.getElementById('links-grid');
  grid.innerHTML = '';
  links.forEach(l => {
    const a = document.createElement('a');
    a.className = 'link-card';
    a.href = l.url;
    a.innerHTML = `<span class="link-icon">${l.icon || 'рҹ”—'}</span><span class="link-label">${l.label}</span>`;
    grid.appendChild(a);
  });
}
renderLinks();

// в”Җв”Җ Weather в”Җв”Җ
const WMO = {
  0:'вҳҖпёҸ',1:'рҹҢӨпёҸ',2:'вӣ…',3:'вҳҒпёҸ',45:'рҹҢ«пёҸ',48:'рҹҢ«пёҸ',
  51:'рҹҢҰпёҸ',53:'рҹҢҰпёҸ',55:'рҹҢ§пёҸ',61:'рҹҢ§пёҸ',63:'рҹҢ§пёҸ',65:'рҹҢ§пёҸ',
  71:'вқ„пёҸ',73:'вқ„пёҸ',75:'вқ„пёҸ',80:'рҹҢҰпёҸ',81:'рҹҢ§пёҸ',82:'вӣҲпёҸ',
  95:'вӣҲпёҸ',96:'вӣҲпёҸ',99:'вӣҲпёҸ'
};
const WMO_DESC = {
  0:'AГ§Дұk',1:'Az bulutlu',2:'ParГ§alДұ bulutlu',3:'Bulutlu',
  45:'Sisli',48:'Sisli',51:'ГҮiseleme',53:'ГҮiseleme',55:'ГҮiseleme',
  61:'YaДҹmurlu',63:'YaДҹmurlu',65:'Kuvvetli yaДҹmur',
  71:'KarlДұ',73:'KarlДұ',75:'YoДҹun kar',
  80:'SaДҹanak',81:'SaДҹanak',82:'Kuvvetli saДҹanak',
  95:'FДұrtДұnalДұ',96:'FДұrtДұnalДұ',99:'FДұrtДұnalДұ'
};

async function fetchWeather(cityName) {
  try {
    document.getElementById('w-desc').textContent = 'YГјkleniyorвҖҰ';
    const geo = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=tr`);
    const gd  = await geo.json();
    if (!gd.results?.length) { document.getElementById('w-desc').textContent = 'Еһehir bulunamadДұ'; return; }
    const { latitude, longitude, name } = gd.results[0];
    const wx = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`);
    const wd = await wx.json();
    const cw = wd.current_weather;
    const code = cw.weathercode;
    document.getElementById('w-icon').textContent = WMO[code] || 'рҹҢЎпёҸ';
    document.getElementById('w-temp').textContent = `${Math.round(cw.temperature)}В°C`;
    document.getElementById('w-desc').textContent = WMO_DESC[code] || 'Hava durumu';
    document.getElementById('w-loc').textContent  = name;
  } catch {
    document.getElementById('w-desc').textContent = 'Hata вҖ” tekrar dene';
  }
}

function refreshWeather() { fetchWeather(city); }
fetchWeather(city);

// в”Җв”Җ Modal в”Җв”Җ
function openModal() {
  document.getElementById('city-input').value = city;
  renderLinkEditor();
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function renderLinkEditor() {
  const ed = document.getElementById('link-editor');
  ed.innerHTML = '';
  links.forEach((l, i) => {
    const row = document.createElement('div');
    row.className = 'link-row';
    row.innerHTML = `
      <input class="modal-input" placeholder="Label" value="${l.label}" data-i="${i}" data-f="label" />
      <input class="modal-input" placeholder="https://вҖҰ" value="${l.url}" data-i="${i}" data-f="url" />
      <button class="remove-btn" onclick="removeLink(${i})">Г—</button>`;
    ed.appendChild(row);
  });
}

function addLinkRow() {
  links.push({ label: 'Link', url: 'https://', icon: 'рҹ”—' });
  renderLinkEditor();
}

function removeLink(i) { links.splice(i, 1); renderLinkEditor(); }

function saveSettings() {
  // collect link edits
  document.querySelectorAll('#link-editor .modal-input').forEach(inp => {
    const i = parseInt(inp.dataset.i);
    const f = inp.dataset.f;
    if (links[i]) links[i][f] = inp.value;
  });
  city = document.getElementById('city-input').value.trim() || 'Istanbul';
  save('nt_links', links);
  save('nt_city', city);
  renderLinks();
  fetchWeather(city);
  closeModal();
}

// close modal on overlay click
document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>
</body>
</html>
